<?xml version="1.0" encoding="UTF-8"?>
<!-- Sample A: green tick above the RWB mark (reads as "passed / OK") -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" width="320" height="200">
  <rect width="320" height="200" fill="#6B6B6B"/>
  <g transform="translate(160, 118)">
    <!-- Slanted bars (italic "III" feel) -->
    <g transform="skewX(-18)">
      <rect x="-54" y="-38" width="22" height="52" fill="#D62828" rx="2"/>
      <rect x="-26" y="-38" width="22" height="52" fill="#F5F5F5" rx="2"/>
      <rect x="2" y="-38" width="22" height="52" fill="#1E3A8A" rx="2"/>
    </g>
    <rect x="-48" y="18" width="96" height="8" fill="#111111" rx="1"/>
  </g>
  <!-- Check above -->
  <path d="M 118 52 L 142 78 L 202 28" fill="none" stroke="#22C55E" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
