<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <rect width="1600" height="900" fill="#0f172a"/>
  <text x="60" y="72" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="44" font-weight="700">Field Mode - Guided Testing and Result Entry</text>

  <rect x="70" y="130" rx="20" ry="20" width="760" height="700" fill="#1e293b" stroke="#475569" stroke-width="3"/>
  <text x="100" y="178" fill="#e2e8f0" font-size="30" font-family="Arial, sans-serif" font-weight="700">Example: Continuity result entry</text>
  <rect x="100" y="210" rx="12" ry="12" width="700" height="580" fill="#111827"/>

  <text x="130" y="250" fill="#f4a261" font-size="20" font-family="Arial, sans-serif">Clause reference shown per step</text>
  <text x="130" y="282" fill="#ffffff" font-size="22" font-family="Arial, sans-serif">Instruction: Enter measured value and choose unit.</text>
  <text x="130" y="325" fill="#ffffff" font-size="22" font-family="Arial, sans-serif">Value: 0.35  ohm</text>

  <rect x="130" y="350" rx="8" ry="8" width="110" height="36" fill="#2d6a4f"/><text x="165" y="374" fill="#fff" font-size="20" font-family="Arial, sans-serif">ohm</text>
  <rect x="250" y="350" rx="8" ry="8" width="110" height="36" fill="#334155"/><text x="277" y="374" fill="#fff" font-size="20" font-family="Arial, sans-serif">kOhm</text>
  <rect x="370" y="350" rx="8" ry="8" width="110" height="36" fill="#334155"/><text x="397" y="374" fill="#fff" font-size="20" font-family="Arial, sans-serif">MOhm</text>

  <rect x="130" y="410" rx="8" ry="8" width="80" height="48" fill="#334155"/><text x="160" y="442" fill="#fff" font-size="28" font-family="Arial, sans-serif">1</text>
  <rect x="220" y="410" rx="8" ry="8" width="80" height="48" fill="#334155"/><text x="250" y="442" fill="#fff" font-size="28" font-family="Arial, sans-serif">2</text>
  <rect x="310" y="410" rx="8" ry="8" width="80" height="48" fill="#334155"/><text x="340" y="442" fill="#fff" font-size="28" font-family="Arial, sans-serif">3</text>
  <rect x="130" y="468" rx="8" ry="8" width="80" height="48" fill="#334155"/><text x="160" y="500" fill="#fff" font-size="28" font-family="Arial, sans-serif">4</text>
  <rect x="220" y="468" rx="8" ry="8" width="80" height="48" fill="#334155"/><text x="250" y="500" fill="#fff" font-size="28" font-family="Arial, sans-serif">5</text>
  <rect x="310" y="468" rx="8" ry="8" width="80" height="48" fill="#334155"/><text x="340" y="500" fill="#fff" font-size="28" font-family="Arial, sans-serif">6</text>
  <rect x="130" y="526" rx="8" ry="8" width="80" height="48" fill="#334155"/><text x="160" y="558" fill="#fff" font-size="28" font-family="Arial, sans-serif">7</text>
  <rect x="220" y="526" rx="8" ry="8" width="80" height="48" fill="#334155"/><text x="250" y="558" fill="#fff" font-size="28" font-family="Arial, sans-serif">8</text>
  <rect x="310" y="526" rx="8" ry="8" width="80" height="48" fill="#334155"/><text x="340" y="558" fill="#fff" font-size="28" font-family="Arial, sans-serif">9</text>
  <rect x="130" y="584" rx="8" ry="8" width="80" height="48" fill="#334155"/><text x="161" y="616" fill="#fff" font-size="28" font-family="Arial, sans-serif">.</text>
  <rect x="220" y="584" rx="8" ry="8" width="80" height="48" fill="#334155"/><text x="250" y="616" fill="#fff" font-size="28" font-family="Arial, sans-serif">0</text>
  <rect x="310" y="584" rx="8" ry="8" width="80" height="48" fill="#2d6a4f"/><text x="332" y="616" fill="#fff" font-size="24" font-family="Arial, sans-serif">OK</text>

  <rect x="130" y="654" rx="8" ry="8" width="260" height="44" fill="#f59e0b"/><text x="220" y="682" fill="#111827" font-size="22" font-family="Arial, sans-serif">Del</text>

  <rect x="870" y="130" rx="20" ry="20" width="660" height="700" fill="#1e293b" stroke="#475569" stroke-width="3"/>
  <text x="905" y="190" fill="#e2e8f0" font-size="32" font-family="Arial, sans-serif" font-weight="700">Why this matters</text>
  <text x="905" y="245" fill="#cbd5e1" font-size="25" font-family="Arial, sans-serif">- Students/operators read values, do not guess presets</text>
  <text x="905" y="290" fill="#cbd5e1" font-size="25" font-family="Arial, sans-serif">- Unit choice is explicit (ohm/kOhm/MOhm/ms/s)</text>
  <text x="905" y="335" fill="#cbd5e1" font-size="25" font-family="Arial, sans-serif">- Internal validation converts units correctly</text>
  <text x="905" y="380" fill="#cbd5e1" font-size="25" font-family="Arial, sans-serif">- Wrong unit selection can correctly fail a test</text>
  <text x="905" y="425" fill="#cbd5e1" font-size="25" font-family="Arial, sans-serif">- Result screen shows pass/fail + clause context</text>
  <text x="905" y="470" fill="#cbd5e1" font-size="25" font-family="Arial, sans-serif">- Session outputs saved as report artifacts</text>

  <rect x="905" y="540" rx="12" ry="12" width="580" height="220" fill="#0b132b" stroke="#334155" stroke-width="2"/>
  <text x="935" y="590" fill="#93c5fd" font-size="28" font-family="Arial, sans-serif" font-weight="700">Field mode outcomes</text>
  <text x="935" y="635" fill="#cbd5e1" font-size="24" font-family="Arial, sans-serif">1) Guided procedure completion</text>
  <text x="935" y="670" fill="#cbd5e1" font-size="24" font-family="Arial, sans-serif">2) Structured result with units</text>
  <text x="935" y="705" fill="#cbd5e1" font-size="24" font-family="Arial, sans-serif">3) Local + SD report persistence</text>
</svg>

