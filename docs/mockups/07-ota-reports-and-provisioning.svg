<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <rect width="1600" height="900" fill="#0f172a"/>
  <text x="60" y="72" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="44" font-weight="700">Operations: OTA, Reporting, Provisioning</text>

  <rect x="70" y="130" rx="20" ry="20" width="480" height="700" fill="#1e293b" stroke="#475569" stroke-width="3"/>
  <text x="98" y="178" fill="#e2e8f0" font-size="30" font-family="Arial, sans-serif" font-weight="700">OTA updates</text>
  <rect x="98" y="212" rx="10" ry="10" width="424" height="70" fill="#111827"/><text x="122" y="258" fill="#fff" font-size="24" font-family="Arial, sans-serif">Check now</text>
  <rect x="98" y="296" rx="10" ry="10" width="424" height="70" fill="#111827"/><text x="122" y="342" fill="#fff" font-size="24" font-family="Arial, sans-serif">Install pending</text>
  <rect x="98" y="380" rx="10" ry="10" width="424" height="70" fill="#111827"/><text x="122" y="426" fill="#fff" font-size="24" font-family="Arial, sans-serif">Auto-check ON/OFF</text>
  <rect x="98" y="464" rx="10" ry="10" width="424" height="70" fill="#111827"/><text x="122" y="510" fill="#fff" font-size="24" font-family="Arial, sans-serif">Auto-install ON/OFF</text>
  <text x="98" y="590" fill="#cbd5e1" font-size="22" font-family="Arial, sans-serif">Manifest-driven, release-backed OTA flow</text>

  <rect x="560" y="130" rx="20" ry="20" width="480" height="700" fill="#1e293b" stroke="#475569" stroke-width="3"/>
  <text x="588" y="178" fill="#e2e8f0" font-size="30" font-family="Arial, sans-serif" font-weight="700">Reports and sync</text>
  <text x="588" y="230" fill="#cbd5e1" font-size="23" font-family="Arial, sans-serif">- Local report files every session</text>
  <text x="588" y="265" fill="#cbd5e1" font-size="23" font-family="Arial, sans-serif">- SD copy in Field mode</text>
  <text x="588" y="300" fill="#cbd5e1" font-size="23" font-family="Arial, sans-serif">- Optional email channel</text>
  <text x="588" y="335" fill="#cbd5e1" font-size="23" font-family="Arial, sans-serif">- Optional cloud channel</text>
  <text x="588" y="370" fill="#cbd5e1" font-size="23" font-family="Arial, sans-serif">- Google Sheets or SharePoint target</text>
  <text x="588" y="405" fill="#cbd5e1" font-size="23" font-family="Arial, sans-serif">- Offline queue + automatic retry</text>
  <text x="588" y="440" fill="#cbd5e1" font-size="23" font-family="Arial, sans-serif">- Session-aware updates when students edit</text>

  <rect x="588" y="500" rx="10" ry="10" width="424" height="220" fill="#111827" stroke="#334155" stroke-width="2"/>
  <text x="612" y="548" fill="#93c5fd" font-size="24" font-family="Arial, sans-serif" font-weight="700">Device identity options</text>
  <text x="612" y="586" fill="#cbd5e1" font-size="22" font-family="Arial, sans-serif">Unique device ID or renamed cubicle label</text>
  <text x="612" y="622" fill="#cbd5e1" font-size="22" font-family="Arial, sans-serif">Used in reports, email, and cloud payloads</text>

  <rect x="1050" y="130" rx="20" ry="20" width="480" height="700" fill="#1e293b" stroke="#475569" stroke-width="3"/>
  <text x="1078" y="178" fill="#e2e8f0" font-size="30" font-family="Arial, sans-serif" font-weight="700">SD provisioning</text>
  <text x="1078" y="230" fill="#cbd5e1" font-size="23" font-family="Arial, sans-serif">- Boot reads SD config</text>
  <text x="1078" y="265" fill="#cbd5e1" font-size="23" font-family="Arial, sans-serif">- Applies Wi-Fi / OTA / reporting settings</text>
  <text x="1078" y="300" fill="#cbd5e1" font-size="23" font-family="Arial, sans-serif">- Supports rapid fleet setup</text>
  <text x="1078" y="335" fill="#cbd5e1" font-size="23" font-family="Arial, sans-serif">- Template/config files auto-generated</text>

  <rect x="1078" y="390" rx="10" ry="10" width="424" height="330" fill="#111827"/>
  <text x="1105" y="440" fill="#93c5fd" font-size="23" font-family="Arial, sans-serif">Example rollout use</text>
  <text x="1105" y="480" fill="#cbd5e1" font-size="21" font-family="Arial, sans-serif">1) Insert prepared SD card</text>
  <text x="1105" y="512" fill="#cbd5e1" font-size="21" font-family="Arial, sans-serif">2) Boot device</text>
  <text x="1105" y="544" fill="#cbd5e1" font-size="21" font-family="Arial, sans-serif">3) Settings apply automatically</text>
  <text x="1105" y="576" fill="#cbd5e1" font-size="21" font-family="Arial, sans-serif">4) Verify and hand to user</text>
  <text x="1105" y="608" fill="#cbd5e1" font-size="21" font-family="Arial, sans-serif">5) Device remains OTA-managed</text>
</svg>

