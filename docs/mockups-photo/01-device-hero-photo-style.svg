<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#1f2937"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#4f46e5" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#4f46e5" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000" flood-opacity="0.45"/>
    </filter>
    <linearGradient id="body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1f2937"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#glow)"/>

  <ellipse cx="800" cy="760" rx="420" ry="58" fill="#020617" opacity="0.75"/>

  <g filter="url(#shadow)" transform="translate(360 120)">
    <rect x="0" y="0" width="880" height="640" rx="48" fill="url(#body)" stroke="#334155" stroke-width="3"/>
    <rect x="36" y="34" width="808" height="520" rx="24" fill="url(#glass)" stroke="#475569" stroke-width="2"/>

    <rect x="70" y="72" width="740" height="62" rx="12" fill="#0f172a"/>
    <text x="100" y="112" fill="#e5e7eb" font-family="Arial, sans-serif" font-size="34" font-weight="700">SparkyCheck</text>
    <text x="640" y="112" fill="#f59e0b" font-family="Arial, sans-serif" font-size="22">Field mode</text>

    <rect x="70" y="162" width="740" height="78" rx="12" fill="#2d6a4f"/>
    <text x="110" y="212" fill="#ffffff" font-family="Arial, sans-serif" font-size="30">Start verification</text>
    <rect x="70" y="258" width="740" height="78" rx="12" fill="#334155"/>
    <text x="110" y="308" fill="#ffffff" font-family="Arial, sans-serif" font-size="30">View reports</text>
    <rect x="70" y="354" width="740" height="78" rx="12" fill="#334155"/>
    <text x="110" y="404" fill="#ffffff" font-family="Arial, sans-serif" font-size="30">Settings</text>

    <text x="72" y="500" fill="#93c5fd" font-family="Arial, sans-serif" font-size="22">Guided testing - OTA - SWP procedures - Training sync</text>

    <circle cx="440" cy="596" r="16" fill="#111827" stroke="#475569"/>
  </g>

  <text x="72" y="96" fill="#e5e7eb" font-family="Arial, sans-serif" font-size="46" font-weight="700">Photo-style concept render</text>
  <text x="72" y="132" fill="#94a3b8" font-family="Arial, sans-serif" font-size="24">Hero visual for brochures, decks, and proposals</text>
</svg>

