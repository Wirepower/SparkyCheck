<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#1f2937"/>
    </linearGradient>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <linearGradient id="hand" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d4a373"/>
      <stop offset="100%" stop-color="#b08968"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#bg2)"/>
  <rect x="0" y="610" width="1600" height="290" fill="#0b1320"/>

  <g opacity="0.85">
    <rect x="120" y="140" width="340" height="420" rx="18" fill="#374151"/>
    <rect x="500" y="180" width="300" height="360" rx="18" fill="#334155"/>
    <rect x="860" y="120" width="260" height="460" rx="18" fill="#475569"/>
  </g>

  <g filter="url(#softShadow)" transform="translate(470 120) rotate(-6 320 320)">
    <rect x="0" y="0" width="640" height="660" rx="40" fill="#0f172a" stroke="#475569" stroke-width="3"/>
    <rect x="28" y="28" width="584" height="560" rx="20" fill="#111827" stroke="#334155" stroke-width="2"/>

    <text x="54" y="82" fill="#e5e7eb" font-family="Arial, sans-serif" font-size="30" font-weight="700">Test flow</text>
    <text x="54" y="116" fill="#f59e0b" font-family="Arial, sans-serif" font-size="20">Step 3 of 6</text>
    <text x="54" y="154" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="20">Enter measured continuity value + unit</text>

    <rect x="54" y="180" width="220" height="44" rx="8" fill="#1f2937"/><text x="72" y="209" fill="#fff" font-size="22" font-family="Arial, sans-serif">0.35</text>
    <rect x="284" y="180" width="90" height="44" rx="8" fill="#2d6a4f"/><text x="307" y="209" fill="#fff" font-size="22" font-family="Arial, sans-serif">ohm</text>
    <rect x="384" y="180" width="100" height="44" rx="8" fill="#334155"/><text x="410" y="209" fill="#fff" font-size="22" font-family="Arial, sans-serif">kOhm</text>

    <rect x="54" y="254" width="140" height="62" rx="10" fill="#334155"/><text x="112" y="294" fill="#fff" font-size="30" font-family="Arial, sans-serif">1</text>
    <rect x="204" y="254" width="140" height="62" rx="10" fill="#334155"/><text x="262" y="294" fill="#fff" font-size="30" font-family="Arial, sans-serif">2</text>
    <rect x="354" y="254" width="140" height="62" rx="10" fill="#334155"/><text x="412" y="294" fill="#fff" font-size="30" font-family="Arial, sans-serif">3</text>
    <rect x="54" y="326" width="140" height="62" rx="10" fill="#334155"/><text x="112" y="366" fill="#fff" font-size="30" font-family="Arial, sans-serif">4</text>
    <rect x="204" y="326" width="140" height="62" rx="10" fill="#334155"/><text x="262" y="366" fill="#fff" font-size="30" font-family="Arial, sans-serif">5</text>
    <rect x="354" y="326" width="140" height="62" rx="10" fill="#334155"/><text x="412" y="366" fill="#fff" font-size="30" font-family="Arial, sans-serif">6</text>
    <rect x="54" y="398" width="140" height="62" rx="10" fill="#334155"/><text x="112" y="438" fill="#fff" font-size="30" font-family="Arial, sans-serif">7</text>
    <rect x="204" y="398" width="140" height="62" rx="10" fill="#334155"/><text x="262" y="438" fill="#fff" font-size="30" font-family="Arial, sans-serif">8</text>
    <rect x="354" y="398" width="140" height="62" rx="10" fill="#334155"/><text x="412" y="438" fill="#fff" font-size="30" font-family="Arial, sans-serif">9</text>
    <rect x="54" y="470" width="140" height="62" rx="10" fill="#334155"/><text x="117" y="510" fill="#fff" font-size="30" font-family="Arial, sans-serif">.</text>
    <rect x="204" y="470" width="140" height="62" rx="10" fill="#334155"/><text x="262" y="510" fill="#fff" font-size="30" font-family="Arial, sans-serif">0</text>
    <rect x="354" y="470" width="140" height="62" rx="10" fill="#2d6a4f"/><text x="404" y="510" fill="#fff" font-size="26" font-family="Arial, sans-serif">OK</text>
  </g>

  <g>
    <ellipse cx="930" cy="760" rx="260" ry="80" fill="url(#hand)" opacity="0.88"/>
    <ellipse cx="760" cy="780" rx="200" ry="70" fill="url(#hand)" opacity="0.78"/>
  </g>

  <text x="70" y="74" fill="#e5e7eb" font-family="Arial, sans-serif" font-size="42" font-weight="700">Field-use photo-style concept</text>
  <text x="70" y="108" fill="#94a3b8" font-family="Arial, sans-serif" font-size="24">Demonstrates in-hand testing workflow visual</text>
</svg>

