<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <filter id="tileShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="9" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="1600" height="900" fill="url(#bg4)"/>
  <text x="60" y="72" fill="#e5e7eb" font-family="Arial, sans-serif" font-size="42" font-weight="700">Photo-style capabilities collage</text>
  <text x="60" y="106" fill="#94a3b8" font-family="Arial, sans-serif" font-size="23">One-slide summary visual for stakeholder presentations</text>

  <g filter="url(#tileShadow)">
    <rect x="70" y="140" width="470" height="330" rx="18" fill="#1f2937"/>
    <text x="98" y="186" fill="#93c5fd" font-size="28" font-family="Arial, sans-serif" font-weight="700">Mode + Security</text>
    <text x="98" y="228" fill="#e5e7eb" font-size="22" font-family="Arial, sans-serif">Hidden admin boot hold</text>
    <text x="98" y="260" fill="#e5e7eb" font-size="22" font-family="Arial, sans-serif">PIN gated settings</text>
    <text x="98" y="292" fill="#e5e7eb" font-size="22" font-family="Arial, sans-serif">3-attempt fail continuation</text>
  </g>

  <g filter="url(#tileShadow)">
    <rect x="565" y="140" width="470" height="330" rx="18" fill="#1f2937"/>
    <text x="593" y="186" fill="#93c5fd" font-size="28" font-family="Arial, sans-serif" font-weight="700">Testing UX</text>
    <text x="593" y="228" fill="#e5e7eb" font-size="22" font-family="Arial, sans-serif">Manual value entry</text>
    <text x="593" y="260" fill="#e5e7eb" font-size="22" font-family="Arial, sans-serif">Explicit unit selection</text>
    <text x="593" y="292" fill="#e5e7eb" font-size="22" font-family="Arial, sans-serif">Clause-aware result display</text>
  </g>

  <g filter="url(#tileShadow)">
    <rect x="1060" y="140" width="470" height="330" rx="18" fill="#1f2937"/>
    <text x="1088" y="186" fill="#93c5fd" font-size="28" font-family="Arial, sans-serif" font-weight="700">Training &amp; Sync</text>
    <text x="1088" y="228" fill="#e5e7eb" font-size="22" font-family="Arial, sans-serif">Student ID capture</text>
    <text x="1088" y="260" fill="#e5e7eb" font-size="22" font-family="Arial, sans-serif">Google/SharePoint optional sync</text>
    <text x="1088" y="292" fill="#e5e7eb" font-size="22" font-family="Arial, sans-serif">Offline queue + retry</text>
  </g>

  <g filter="url(#tileShadow)">
    <rect x="70" y="500" width="470" height="330" rx="18" fill="#1f2937"/>
    <text x="98" y="546" fill="#93c5fd" font-size="28" font-family="Arial, sans-serif" font-weight="700">RCD Compliance</text>
    <text x="98" y="588" fill="#e5e7eb" font-size="22" font-family="Arial, sans-serif">Context prompt before testing</text>
    <text x="98" y="620" fill="#e5e7eb" font-size="22" font-family="Arial, sans-serif">Required max entered first</text>
    <text x="98" y="652" fill="#e5e7eb" font-size="22" font-family="Arial, sans-serif">Measured result compared to criterion</text>
  </g>

  <g filter="url(#tileShadow)">
    <rect x="565" y="500" width="470" height="330" rx="18" fill="#1f2937"/>
    <text x="593" y="546" fill="#93c5fd" font-size="28" font-family="Arial, sans-serif" font-weight="700">SWP Procedures</text>
    <text x="593" y="588" fill="#e5e7eb" font-size="22" font-family="Arial, sans-serif">Motor / Appliance / Heater-Sheathed</text>
    <text x="593" y="620" fill="#e5e7eb" font-size="22" font-family="Arial, sans-serif">AS/NZS 4836 sequence built-in</text>
    <text x="593" y="652" fill="#e5e7eb" font-size="22" font-family="Arial, sans-serif">Lead zeroing + common mistakes</text>
  </g>

  <g filter="url(#tileShadow)">
    <rect x="1060" y="500" width="470" height="330" rx="18" fill="#1f2937"/>
    <text x="1088" y="546" fill="#93c5fd" font-size="28" font-family="Arial, sans-serif" font-weight="700">Operations</text>
    <text x="1088" y="588" fill="#e5e7eb" font-size="22" font-family="Arial, sans-serif">OTA updates</text>
    <text x="1088" y="620" fill="#e5e7eb" font-size="22" font-family="Arial, sans-serif">SD provisioning</text>
    <text x="1088" y="652" fill="#e5e7eb" font-size="22" font-family="Arial, sans-serif">Reports (local, SD, optional email/cloud)</text>
  </g>
</svg>

