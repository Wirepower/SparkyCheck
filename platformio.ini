; Target: ILI9488 SPI (480x320) + GT911 on the pins below — a discrete SPI TFT module, NOT Waveshare 4.3B.
;
; Waveshare ESP32-S3-Touch-LCD-4.3B / 4.3B-BOX (see wiki): 800x480 RGB LCD, CH422G expander (e.g. EXIO2 DISP/backlight,
; EXIO1 TP_RST, EXIO4 SD_CS), GT911 on GPIO8/9 + IRQ GPIO4, TF card SPI on 11/12/13 with CS via CH422G.
; Official path: ESP32_Display_Panel + ESP32_IO_Expander + LVGL (Arduino demos 08_DrawColorBar, 09_lvgl_Porting).
; https://www.waveshare.com/wiki/ESP32-S3-Touch-LCD-4.3B
; Retail (AU, same hardware): Core Electronics WS-28141 — https://core-electronics.com.au/esp32-s3-43inch-touch-lcd-development-board.html
; SPI env: ILI9488 module. Waveshare 4.3B: use env waveshare-s3-touch-lcd-43b (RGB + ESP32_Display_Panel).
;
; On a real ILI9488 SPI module: TFT_DC and TOUCH_INT must be different GPIOs (see build_flags below).

[platformio]
default_envs = waveshare-s3-touch-lcd-43b

; Waveshare ESP32-S3-Touch-LCD-4.3B / 4.3B-BOX — upload: pio run -e waveshare-s3-touch-lcd-43b -t upload
; (USB CDC on boot is enabled; use the board’s USB-C port. If the port is missing, hold BOOT while plugging in, then release.)
; ESP32_Display_Panel needs Arduino-ESP32 3.1.x + IDF 5.x (esp_lcd RGB enums, etc.). Stock platform espressif32 is still 2.0.x.
; Use pioarduino's bundled Arduino 3.1.1 + lib packages (GitHub release zips). Do not override with dl.espressif "all" libs:
; those trees include Matter/connectedhomeip paths that exceed Windows MAX_PATH when PlatformIO unpacks under .platformio\.cache.
[env:waveshare-s3-touch-lcd-43b]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/53.03.11/platform-espressif32.zip
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
upload_speed = 921600
board_build.partitions = default_16MB.csv
board_build.arduino.memory_type = qio_opi
board_upload.flash_size = 16MB
board_build.flash_mode = qio
board_build.psram = opi
build_unflags = -std=gnu++11
build_flags =
    -std=gnu++17
    -DSPARKYCHECK_PANEL_43B
    -DBOARD_HAS_PSRAM
    -DESP_PANEL_BOARD_DEFAULT_USE_SUPPORTED=1
    -DBOARD_WAVESHARE_ESP32_S3_TOUCH_LCD_4_3_B
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DFIRMWARE_VERSION=\"2026.03.15\"
    -DOTA_MANIFEST_URL=\"https://raw.githubusercontent.com/Wirepower/SparkyCheck/main/ota/manifest-stable.json\"
    -DOTA_CHANNEL=\"stable\"
    -DOTA_TLS_INSECURE=1

lib_deps =
    https://github.com/esp-arduino-libs/ESP32_Display_Panel.git
    https://github.com/esp-arduino-libs/ESP32_IO_Expander.git#v1.1.0
    https://github.com/esp-arduino-libs/esp-lib-utils.git#v0.2.0
    adafruit/Adafruit GFX Library
    adafruit/Adafruit BusIO
    https://github.com/me-no-dev/ESPAsyncWebServer.git
    https://github.com/me-no-dev/AsyncTCP.git
    https://github.com/mobizt/ESP-Mail-Client.git
    bluetoothserial
    preferences
    bblanchon/ArduinoJson@^6.21.4
    adafruit/Adafruit Neopixel

lib_ignore = WebServer